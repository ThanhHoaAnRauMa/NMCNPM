name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend database and API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install feature backend dependencies
        run: npm ci --prefix src/backend

      - name: Check feature backend syntax
        run: |
          node --check src/backend/server.js
          find src/backend/src -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run backend unit tests
        shell: bash
        run: |
          set +e
          node --test --test-concurrency=1 \
            test/backend/ai-prompts.test.js \
            test/backend/ai-route.test.js \
            test/backend/chat-socket.test.js \
            test/backend/cloudinary-utils.test.js \
            test/backend/gemini-client.test.js \
            test/backend/messages-query.test.js \
            test/backend/messages-route.test.js \
            test/backend/models.test.js \
            test/backend/signature-utils.test.js 2>&1 | tee backend-unit-test.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "### Backend unit test failure tail"
              echo
              echo '```text'
              tail -n 160 backend-unit-test.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$status"

      - name: Run backend feature API tests
        run: node --test test/backend/feature-api.test.js

      - name: Run backend integration tests
        run: node --test test/backend/integration.test.js

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build backend image
        run: docker build .

  frontend:
    name: Frontend test and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build frontend image
        working-directory: .
        run: docker build ./frontend

  contracts:
    name: Foundry contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      # Existing Solidity formatting drift belongs to the Blockchain owner.
      - name: Check Forge formatting
        continue-on-error: true
        run: forge fmt --check

      - name: Build contracts
        run: forge build --sizes

      - name: Run contract tests
        run: forge test -vvv
