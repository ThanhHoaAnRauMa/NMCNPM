name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend database and API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install feature backend dependencies
        run: npm ci --prefix src/backend

      - name: Check feature backend syntax
        run: find src/backend -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run backend tests
        run: npm test

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build backend image
        run: docker build .

  frontend:
    name: Frontend test and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build frontend image
        working-directory: .
        run: docker build ./frontend

  contracts:
    name: Foundry contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      # Existing Solidity formatting drift belongs to the Blockchain owner.
      - name: Check Forge formatting
        continue-on-error: true
        run: forge fmt --check

      - name: Build contracts
        run: forge build --sizes

      - name: Run contract tests
        run: forge test -vvv
