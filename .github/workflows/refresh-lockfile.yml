name: Refresh Dependency Lockfile

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch that receives the lockfile refresh commit
        required: true
        default: feature/database-devops
        type: string
  schedule:
    - cron: '20 2 * * 1'

permissions:
  contents: write

concurrency:
  group: refresh-lockfile-${{ github.event.inputs.target_branch || 'main' }}
  cancel-in-progress: false

jobs:
  refresh-lockfile:
    name: Refresh and commit package-lock.json
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'main' }}
    steps:
      - name: Validate target branch
        shell: bash
        run: |
          if [[ ! "$TARGET_BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]] || [[ "$TARGET_BRANCH" == -* ]]; then
            echo "Invalid target branch: $TARGET_BRANCH"
            exit 1
          fi

      - name: Checkout target branch
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Refresh lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Install exact dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

      - name: Commit and push lockfile when changed
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- package-lock.json
          git commit -m "chore(deps): refresh package lock [skip ci]"
          git push origin "HEAD:$TARGET_BRANCH"
