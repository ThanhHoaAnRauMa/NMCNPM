services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      MONGO_URI: mongodb://mongo:27017/${MONGO_DATABASE:-securechat}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      SALT_ROUNDS: ${SALT_ROUNDS:-12}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-128kb}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_TIMEOUT_MS: ${GEMINI_TIMEOUT_MS:-10000}
      GEMINI_MODERATION_TIMEOUT_MS: ${GEMINI_MODERATION_TIMEOUT_MS:-2000}
      AI_MAX_SUMMARY_MESSAGES: ${AI_MAX_SUMMARY_MESSAGES:-100}
      AI_MAX_MESSAGE_CHARS: ${AI_MAX_MESSAGE_CHARS:-4000}
      AI_MAX_TOTAL_CHARS: ${AI_MAX_TOTAL_CHARS:-20000}
      JWT_SECRET: ${JWT_SECRET:-local_access_secret_change_before_deploy}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local_refresh_secret_change_before_deploy}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://127.0.0.1:$${PORT:-3000}/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - '${PORT:-3000}:${PORT:-3000}'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_CONTRACT_ADDRESS: ${VITE_CONTRACT_ADDRESS:-}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - '${FRONTEND_PORT:-5173}:80'

  mongo:
    image: mongo:8.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-securechat}
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mongo-data:/data/db
    ports:
      - '${MONGO_PORT:-27017}:27017'

volumes:
  mongo-data:
